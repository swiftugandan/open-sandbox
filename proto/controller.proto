syntax = "proto3";
package open_sandbox.controller;

import "google/protobuf/timestamp.proto";
import "api.proto";

// ControllerService — the long-lived bidi stream between each agent
// and the controller. Carries lifecycle-only traffic in v1.0:
// registration, heartbeats, sandbox start/stop, status reports,
// log fetches. Exec is no longer routed through this stream —
// gateway-originated exec flows through the proxy data plane (see
// proxy.proto SandboxIoService).
service ControllerService {
  rpc AgentStream(stream AgentMessage) returns (stream ControllerCommand);
}

message AgentMessage {
  oneof payload {
    RegisterRequest register = 1;
    Heartbeat heartbeat = 2;
    SandboxStatus sandbox_status = 3;
    ResourceReport resource_report = 4;
    // Field 5 was ExecResult in v0.x; removed in v1.0. Exec
    // results flow on the data-plane I/O stream now.
  }
}

message ControllerCommand {
  oneof payload {
    RegisterResponse register_response = 1;
    HeartbeatAck heartbeat_ack = 2;
    StartSandbox start_sandbox = 3;
    StopSandbox stop_sandbox = 4;
    // Field 5 was ExecCommand in v0.x; removed in v1.0.
    FetchLogsCommand fetch_logs = 5;
  }
}

message RegisterRequest {
  string agent_id = 1;
  string join_token = 2;
  AgentResources resources = 3;
}

message RegisterResponse {
  bool accepted = 1;
  string rejection_reason = 2;
  string agent_certificate = 3;
}

message Heartbeat {
  string agent_id = 1;
  google.protobuf.Timestamp timestamp = 2;
}

message HeartbeatAck {
  google.protobuf.Timestamp timestamp = 1;
}

message AgentResources {
  uint32 cpu_cores = 1;
  uint64 memory_bytes = 2;
  Architecture arch = 3;
  string os = 4;
}

enum Architecture {
  ARCHITECTURE_UNSPECIFIED = 0;
  ARCHITECTURE_X86_64 = 1;
  ARCHITECTURE_AARCH64 = 2;
}

message SandboxStatus {
  string sandbox_id = 1;
  SandboxState state = 2;
  string error_message = 3;
}

enum SandboxState {
  SANDBOX_STATE_UNSPECIFIED = 0;
  SANDBOX_STATE_CREATING = 1;
  SANDBOX_STATE_RUNNING = 2;
  SANDBOX_STATE_STOPPING = 3;
  SANDBOX_STATE_STOPPED = 4;
  SANDBOX_STATE_FAILED = 5;
}

message ResourceReport {
  string agent_id = 1;
  uint32 available_cpu_millicores = 2;
  uint64 available_memory_bytes = 3;
  uint32 running_sandboxes = 4;
}

message StartSandbox {
  string sandbox_id = 1;
  string image = 2;
  SandboxConfig config = 3;
}

message SandboxConfig {
  uint32 cpu_limit_millicores = 1;
  uint64 memory_limit_bytes = 2;
  map<string, string> env_vars = 3;
  uint32 exposed_port = 4;
  // v1.0.2: pull-policy threaded from CreateSandboxRequest through
  // the controller to the agent runtime. Enum lives in api.proto;
  // UNSPECIFIED here means IF_NOT_PRESENT (current optimized behavior).
  open_sandbox.api.PullPolicy pull_policy = 5;
}

message StopSandbox {
  string sandbox_id = 1;
  uint32 timeout_seconds = 2;
}

message FetchLogsCommand {
  string sandbox_id = 1;
  uint32 tail_lines = 2;
  bool follow = 3;
}
