syntax = "proto3";
package open_sandbox.proxy;

// SandboxIoService — the agent's outbound multiplex for sandbox I/O.
//
// The agent opens OpenTunnel as the long-lived reverse-tunnel
// connection used for public HTTP forwarding AND for gateway-
// originated I/O sessions (exec, file ops). The proxy multiplexes
// virtual streams of either kind into the same agent connection,
// distinguished by the oneof variant in TunnelRequest/TunnelResponse.
//
// The API gateway opens OpenIoStream against the proxy on an
// internal listener to originate a single I/O session; the proxy
// routes by the sandbox_id in the IoStart frame and bridges the
// gateway-side stream to a virtual stream inside the owning agent's
// tunnel.
service SandboxIoService {
  // Agent → proxy reverse tunnel (long-lived, one per agent).
  // Carries both inbound public HTTP and gateway-originated I/O.
  rpc OpenTunnel(stream TunnelResponse) returns (stream TunnelRequest);

  // Gateway → proxy I/O session (one per public WebSocket).
  // First IoClientFrame MUST be IoStart carrying sandbox_id and
  // op-specific params. The proxy routes by sandbox_id to the
  // owning agent's tunnel and bridges the streams.
  rpc OpenIoStream(stream IoClientFrame) returns (stream IoServerFrame);
}

// ===== Existing tunnel envelope (now carries both HTTP and I/O) =====

message TunnelRequest {
  string stream_id = 1;
  oneof payload {
    HttpRequest http_request = 2;
    DataChunk data = 3;
    StreamClose close = 4;
    IoClientFrame io_client = 5;
  }
}

message TunnelResponse {
  string stream_id = 1;
  oneof payload {
    HttpResponse http_response = 2;
    DataChunk data = 3;
    StreamClose close = 4;
    TunnelReady ready = 5;
    IoServerFrame io_server = 6;
  }
}

message TunnelReady {
  string agent_id = 1;
}

message HttpRequest {
  string method = 1;
  string uri = 2;
  map<string, string> headers = 3;
  bytes body = 4;
  string sandbox_id = 5;
}

message HttpResponse {
  uint32 status_code = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

message DataChunk {
  bytes data = 1;
  bool is_final = 2;
}

message StreamClose {
  string reason = 1;
}

// ===== Sandbox I/O streaming frames =====
//
// One IoClient/IoServer pair = one virtual stream on the agent's
// tunnel = one streaming exec or file-read session at the public
// WebSocket layer. Lifetime is connection-bound: closing the
// upstream WebSocket → gateway closes its OpenIoStream → proxy
// closes its virtual stream → agent receives end-of-stream and
// SIGTERMs the in-container PID (via the ExecRegistry cleanup
// hook).

message IoClientFrame {
  // The proxy assigns stream_id when bridging the gateway's
  // OpenIoStream call into the agent's tunnel; it is unique per
  // tunnel connection. ExecRegistry on the agent keys on this.
  string stream_id = 1;
  oneof payload {
    // First client frame on every session. Carries sandbox_id and
    // op-specific parameters.
    IoStart start = 2;
    // Raw stdin bytes flowing toward the in-container process.
    bytes stdin = 3;
    // POSIX signal to deliver to the in-container PID.
    IoSignal signal = 4;
    // Half-close stdin or end the session.
    IoClose close = 5;
  }
}

message IoServerFrame {
  string stream_id = 1;
  oneof payload {
    // First server frame after handshake; carries the agent's
    // runtime-side exec_id and the captured in-container PID
    // (for diagnostics — clients should not key on them).
    IoStarted started = 2;
    // Raw stdout / stderr bytes flowing back to the caller.
    bytes stdout = 3;
    bytes stderr = 4;
    // Process exited normally (may still be exit != 0).
    IoExited exited = 5;
    // Runtime-level error (container gone, exec API failed,
    // signal delivery failed, etc). Terminates the stream.
    IoError error = 6;
    // v1.0.3: typed one-level directory listing result for
    // ListDir IoStart sessions. One emit, then Exited.
    ListDirResult list_dir_result = 7;
    // v1.0.3: typed TCP-probe result for WaitPortListening
    // IoStart sessions. One emit, then Exited.
    WaitPortListeningResult wait_port_listening_result = 8;
    // v1.0.3: emitted before the first Stdout chunk of a ReadFile
    // session AND in the post-write ACK of a WriteFile session.
    // Carries the opaque file revision token used by the UI to
    // gate optimistic writes (X-File-Revision in the gateway).
    FileMeta file_meta = 9;
  }
}

message IoStart {
  string sandbox_id = 1;
  // The oneof variant selects the operation. No separate enum;
  // the variant IS the operation type.
  oneof params {
    ExecParams exec = 2;
    ReadFileParams read_file = 3;
    WriteFileParams write_file = 4;
    WriteFilesTargzParams write_files_targz = 5;
    // v1.0.3: one-level directory listing for the UI file tree.
    // Caps at 5000 entries with `truncated` flag; the agent
    // enforces the cap so a runaway readdir can't OOM the
    // gateway. See ListDirResult below for the response shape.
    ListDirParams list_dir = 6;
    // v1.0.3: TCP-probe `127.0.0.1:<host_port>` from the agent
    // host until the in-container dev-server is listening or
    // `timeout_ms` elapses. Used by the UI save-chain to gate
    // the preview-iframe refresh on watchexec-restart completion.
    WaitPortListeningParams wait_port_listening = 7;
    // v1.0.3: delete a file or directory. `recursive=false`
    // refuses to delete directories (matches `rm` semantics);
    // `recursive=true` deletes everything under `path` (matches
    // `rm -rf`). Missing path is a no-op (Ok) rather than an
    // error so the UI's delete-then-refresh sequence stays
    // idempotent under concurrent external `rm`.
    DeleteFileParams delete_file = 8;
  }
}

message ExecParams {
  repeated string command = 1;
  // Working directory inside the container. Empty = container default.
  string cwd = 2;
  // Additional environment variables overlaid on the container's env.
  map<string, string> env = 3;
  // PTY allocation deliberately NOT defined here. proto3 supports
  // additive fields without a major bump; PTY arrives in v1.1 when
  // it actually has an implementation.
}

message ReadFileParams {
  string path = 1;
  string cwd = 2;
}

// Atomic single-file write. The runtime writes to a temp file in
// the target's directory and renames into place (per agent runtime
// trait write_file). Caller streams file contents via subsequent
// `stdin` frames; closing the client stream (or sending an
// `IoClose { stdin_eof: true }`) signals EOF.
message WriteFileParams {
  string path = 1;
  string cwd = 2;
  // v1.0.3: opaque revision token the caller previously received
  // for this file (via FileMeta on the matching read). Empty
  // string means "no precondition" — preserves wire compat with
  // v1.0.1/v1.0.2 senders that don't set this field.
  string expected_revision = 3;
  // v1.0.3: skip the expected_revision check. Escape hatch for
  // scripted bulk writes that intentionally last-write-wins.
  bool force = 4;
}

// Bulk write via gzipped tar archive. Caller streams the tarball
// via subsequent `stdin` frames; mkdir-and-extract is performed by
// the runtime (per agent runtime trait write_files_targz).
message WriteFilesTargzParams {
  string cwd = 1;
}

message IoSignal {
  // POSIX signal number (e.g. 15 = SIGTERM, 9 = SIGKILL, 2 = SIGINT).
  uint32 signum = 1;
}

message IoClose {
  // true → close stdin only (process keeps running, may still
  //         emit stdout/stderr).
  // false → end the entire session (agent SIGTERMs the in-container
  //          PID via the ExecRegistry cleanup hook).
  bool stdin_eof = 1;
}

message IoStarted {
  string exec_id = 1;
  int32 in_container_pid = 2;
}

message IoExited {
  int32 exit_code = 1;
  // True when the runtime reported the executable was missing
  // (vs a process that ran and exited with code 127 on its own).
  bool command_not_found = 2;
}

message IoError {
  // Stable identifier (e.g. "RUNTIME_ERROR", "SANDBOX_GONE",
  // "EXEC_FAILED", "READ_FAILED"). SDKs match on code.
  string code = 1;
  string detail = 2;
}

// ===== v1.0.3: live-edit additions =====

// ListDirParams selects one-level directory listing. The runtime
// reads `path` (relative paths resolve against `cwd`, defaulting
// to the runtime's DEFAULT_WRITE_CWD) and emits ListDirResult.
message ListDirParams {
  string path = 1;
  string cwd = 2;
}

// ListDirEntryType collapses the kernel-level inode zoo into the
// four cases the UI cares about. FIFOs, sockets, device nodes etc
// collapse to Other so callers don't have to enumerate the long tail.
enum ListDirEntryType {
  LIST_DIR_ENTRY_TYPE_UNSPECIFIED = 0;
  LIST_DIR_ENTRY_TYPE_FILE = 1;
  LIST_DIR_ENTRY_TYPE_DIR = 2;
  LIST_DIR_ENTRY_TYPE_SYMLINK = 3;
  LIST_DIR_ENTRY_TYPE_OTHER = 4;
}

message ListDirEntry {
  string name = 1;
  // Wire field name is `type`. prost emits this as `r#type`
  // (raw identifier) in the generated Rust binding because
  // `type` is a Rust keyword; no rename attribute is configured.
  ListDirEntryType type = 2;
  // For files: byte count. For symlinks: target-string length.
  // For dirs / other: 0.
  uint64 size = 3;
  // Same opaque-revision contract as FileMeta below.
  string revision = 4;
  // Octal-formatted permission bits, e.g. "0755", "0644".
  string mode = 5;
  // Only populated for symlinks. Empty otherwise.
  string target = 6;
}

message ListDirResult {
  string path = 1;
  repeated ListDirEntry entries = 2;
  // True when readdir was capped at 5000 entries. UI shows a
  // "truncated" banner; user can drill in to a subtree to widen.
  bool truncated = 3;
  // Number of entries the runtime saw before applying the cap.
  // Always >= entries.len(). Equal when truncated == false.
  uint64 total_entries = 4;
}

// WaitPortListeningParams: TCP-probe the sandbox's host-side port
// until the in-container dev-server is listening or timeout_ms
// elapses. `port` is the in-container port the user told us the
// dev server binds to; the agent translates to the registered
// host_port for the sandbox.
message WaitPortListeningParams {
  uint32 port = 1;
  uint32 timeout_ms = 2;
}

message WaitPortListeningResult {
  bool ready = 1;
  uint32 elapsed_ms = 2;
}

// FileMeta carries the opaque revision token + size for a file.
// On a ReadFile session FileMeta is emitted BEFORE the first
// Stdout chunk (so the UI captures the revision before consuming
// bytes). On a WriteFile session FileMeta is emitted BEFORE the
// terminal IoExited frame (carrying the revision of the
// just-written content). FileMeta is a sidecar — it is NEVER a
// session terminator; the "one IoExited or IoError per session"
// invariant from v1.0.1 / v1.0.2 is preserved. v1.0.2 consumers
// that block on IoExited keep working unchanged.
//
// The wire encoding of `revision` is opaque to clients; the
// reference agent implementation uses `mtime_nanos:size`.
message FileMeta {
  string revision = 1;
  uint64 size = 2;
}

// DeleteFileParams: remove a file or directory. Matches `rm` /
// `rm -r` semantics on the wire: `recursive=false` errors on a
// directory; `recursive=true` removes everything under `path`.
// Missing path resolves to Ok (idempotent — the UI may racing
// with an external `rm` and we don't want spurious 404s
// during a tree refresh).
message DeleteFileParams {
  string path = 1;
  string cwd = 2;
  bool recursive = 3;
}
