# Minimal mock smoke topology — drives infra/e2e/run.sh, which only
# checks that the agent registers and reaches `active` state. Intentionally
# leaner than docker-compose.full.yml (no api service, no internal token,
# no log config). For full streaming-exec scenarios use docker-compose.full.yml.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_sandbox
      POSTGRES_PASSWORD: test
    networks:
      platform:
        ipv4_address: 10.0.0.2
    healthcheck:
      test: pg_isready -U postgres
      interval: 2s
      retries: 15

  controller:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: controller --database-url postgres://postgres:test@10.0.0.2:5432/open_sandbox
    environment:
      OPEN_SANDBOX_JOIN_TOKEN: e2e-mock-token
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      platform:
        ipv4_address: 10.0.0.3

  proxy:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: proxy --database-url postgres://postgres:test@10.0.0.2:5432/open_sandbox
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      platform:
        ipv4_address: 10.0.0.4

  agent:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: agent --controller-url http://10.0.0.3:50051 --proxy-url http://10.0.0.4:50052
    environment:
      OPEN_SANDBOX_JOIN_TOKEN: e2e-mock-token
    depends_on:
      - controller
      - proxy
    networks:
      platform:
        ipv4_address: 10.0.0.10

networks:
  platform:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
