syntax = "proto3";
package open_sandbox.api;

// SandboxManagementService — lifecycle-only RPCs from the API
// gateway to the controller. Exec was removed in v1.0; streaming
// I/O (exec, file read) flows through the proxy via
// SandboxIoService.OpenIoStream — see proxy.proto.
service SandboxManagementService {
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc DeleteSandbox(DeleteSandboxRequest) returns (DeleteSandboxResponse);
  // v1.0.2: pause a running sandbox (freezes the in-container
  // processes via the runtime backend's pause primitive — Docker's
  // pause API, cgroup-v2 freezer for youki). The container, tunnel,
  // and exec-registry stay alive; gateway-initiated exec sessions
  // block until the sandbox is resumed. Idempotent: pausing an
  // already-paused sandbox is a no-op success.
  rpc PauseSandbox(PauseSandboxRequest) returns (PauseSandboxResponse);
  // v1.0.2: resume a paused sandbox. Inverse of PauseSandbox.
  // Idempotent: unpausing a running sandbox is a no-op success.
  rpc UnpauseSandbox(UnpauseSandboxRequest) returns (UnpauseSandboxResponse);
}

message CreateSandboxRequest {
  string image = 1;
  uint32 cpu_millicores = 2;
  uint64 memory_bytes = 3;
  map<string, string> env_vars = 4;
  uint32 exposed_port = 5;
  // v1.0.2: how the agent should treat the image cache. Default
  // (PULL_POLICY_UNSPECIFIED) is interpreted as IF_NOT_PRESENT, which
  // matches the docker run default and the current agent-docker
  // optimized warm-path behavior. Set ALWAYS for floating tags
  // (:latest) that must be refreshed on every start; NEVER for
  // air-gapped / strict-pin environments where the image MUST already
  // be local.
  PullPolicy pull_policy = 6;
}

// v1.0.2: pull-policy semantics live in api.proto rather than
// controller.proto because they are caller-facing — the gateway
// validates and defaults them at the JSON boundary. The controller
// passes the enum through unchanged via SandboxConfig.pull_policy.
enum PullPolicy {
  PULL_POLICY_UNSPECIFIED = 0;
  PULL_POLICY_IF_NOT_PRESENT = 1;
  PULL_POLICY_ALWAYS = 2;
  PULL_POLICY_NEVER = 3;
}

message CreateSandboxResponse {
  string sandbox_id = 1;
  string subdomain = 2;
  string agent_id = 3;
  string status = 4;
}

message GetSandboxRequest {
  string sandbox_id = 1;
}

message GetSandboxResponse {
  string sandbox_id = 1;
  string agent_id = 2;
  string subdomain = 3;
  string status = 4;
  // Reason the sandbox is in its current state, when available.
  // Populated for terminal states like "failed" with the agent's
  // failure detail (e.g. cgroup or image-pull errors). Empty string
  // means "no reason recorded".
  string error = 5;
}

message DeleteSandboxRequest {
  string sandbox_id = 1;
}

message DeleteSandboxResponse {
  bool deleted = 1;
}

message ListSandboxesRequest {
}

message ListSandboxesResponse {
  repeated GetSandboxResponse sandboxes = 1;
}

// v1.0.2: PauseSandbox / UnpauseSandbox.
//
// The response carries the post-transition status so callers don't
// need a follow-up GetSandbox. The state itself is opaque-as-string
// because the API gateway has always exposed status as a string
// (consistent with GetSandboxResponse.status) — clients pattern-match
// on "running" / "paused" / "stopped" / "failed".
//
// Errors:
//   * NotFound (sandbox_id has no routing entry) → HTTP 404
//   * FailedPrecondition (sandbox in a state that can't accept this
//     transition — e.g. PauseSandbox on a stopped sandbox) → HTTP 409
//   * Internal (agent runtime or tunnel error) → HTTP 500
//
// Both RPCs are idempotent on the steady-state side: pausing an
// already-paused sandbox returns `status="paused"` without dispatching
// a runtime call; unpausing a running sandbox returns
// `status="running"` likewise.
message PauseSandboxRequest {
  string sandbox_id = 1;
}

message PauseSandboxResponse {
  string status = 1;
}

message UnpauseSandboxRequest {
  string sandbox_id = 1;
}

message UnpauseSandboxResponse {
  string status = 1;
}
