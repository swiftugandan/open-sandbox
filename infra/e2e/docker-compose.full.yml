services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_sandbox
      POSTGRES_PASSWORD: test
    networks:
      platform:
        ipv4_address: 10.0.0.2
    healthcheck:
      test: pg_isready -U postgres
      interval: 2s
      retries: 15

  controller:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: controller --database-url postgres://postgres:test@10.0.0.2:5432/open_sandbox
    environment:
      OPEN_SANDBOX_JOIN_TOKEN: e2e-token
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      platform:
        ipv4_address: 10.0.0.3

  proxy:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: proxy --database-url postgres://postgres:test@10.0.0.2:5432/open_sandbox
    environment:
      RUST_LOG: info
    depends_on:
      - controller
    networks:
      platform:
        ipv4_address: 10.0.0.4

  agent:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: agent --controller-url http://10.0.0.3:50051 --proxy-url http://10.0.0.4:50052
    environment:
      OPEN_SANDBOX_JOIN_TOKEN: e2e-token
      RUST_LOG: info
    depends_on:
      - controller
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      platform:
        ipv4_address: 10.0.0.10

  api:
    build:
      context: ../..
      dockerfile: infra/e2e/Dockerfile
    command: api --controller-url http://10.0.0.3:50051 --proxy-url http://10.0.0.4:50052
    environment:
      OPEN_SANDBOX_API_KEY: e2e-api-key
      RUST_LOG: info
    depends_on:
      - controller
      - proxy
    ports:
      - "18081:8081"
    networks:
      platform:
        ipv4_address: 10.0.0.5

networks:
  platform:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
